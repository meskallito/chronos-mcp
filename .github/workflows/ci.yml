name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black ruff mypy radon

    - name: Run ruff
      run: ruff check chronos_mcp

    - name: Check formatting with black
      run: black --check chronos_mcp tests

    - name: Check cyclomatic complexity
      run: |
        # Run radon to check for overly complex functions (C rating or higher)
        # Ratings: A=1-5, B=6-10, C=11-20, D=21-30, E=31+
        echo "Checking cyclomatic complexity (threshold: C rating or higher)..."
        radon cc chronos_mcp --min=C --show-complexity || echo "::warning::Found functions with high complexity (C+ rating). Consider refactoring."

    - name: Run MyPy
      run: mypy chronos_mcp

  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run unit tests with coverage
      run: |
        # Target 75% coverage (aspirational - current: 77%)
        # Main gaps: bulk operations (40%), tools/events (44%), tools/calendars (51%)
        pytest tests/unit/ --cov=chronos_mcp --cov-report=xml --cov-report=term --cov-fail-under=75 || echo "::warning::Coverage below 75% threshold"

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: codecov/codecov-action@v7
      with:
        file: ./coverage.xml
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Run Bandit Security Scan
      uses: gaurav-nelson/bandit-action@v1
      with:
        path: "chronos_mcp"

    - name: Run Safety Check
      run: |
        pip install safety
        safety check

  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build distribution
      run: python -m build

    - name: Check distribution
      run: twine check dist/*

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: dist
        path: dist/
        retention-days: 7

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [lint, test, security, build]
    if: always()

    steps:
    - name: Report pipeline result
      if: github.event_name == 'push'
      run: |
        echo "CI/CD pipeline completed for ${{ github.ref }}"
